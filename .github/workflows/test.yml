name: test

on:
  push:
    branches:
      - '*'
    tags-ignore:
      - '*'
  pull_request:

jobs:
  raku:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        raku-version:
          - 'latest'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: Raku/setup-raku@v1
        with:
          raku-version: ${{ matrix.raku-version }}
      - name: Setup VS Dev Environment
        if: runner.os == 'Windows'
        uses: compnerd/gha-setup-vsdevenv@v6
      - name: Build C library (Unix)
        if: runner.os != 'Windows'
        run: cd vendor/croaring && make
      - name: Build C library (Windows)
        if: runner.os == 'Windows'
        run: cl /O2 /LD /Ivendor\croaring /Fe:vendor\croaring\libcroaring.dll vendor\croaring\roaring.c vendor\croaring\helpers.c
      - name: Stage C library (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p resources/lib
          cp vendor/croaring/libcroaring.* resources/lib/
          touch resources/lib/libcroaring.dylib resources/lib/libcroaring.so resources/lib/libcroaring.dll
      - name: Stage C library (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path resources\lib
          Copy-Item vendor\croaring\libcroaring.dll resources\lib\
          New-Item -ItemType File -Force -Path resources\lib\libcroaring.dylib
          New-Item -ItemType File -Force -Path resources\lib\libcroaring.so
      - name: Install Dependencies
        run: zef install --/test --test-depends --deps-only .
      - name: Install App::Prove6
        run: zef install --/test App::Prove6
      - name: Run Tests
        run: prove6 --verbose -I. t
