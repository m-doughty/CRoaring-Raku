name: test

on:
  push:
    branches:
      - '*'
    tags-ignore:
      - '*'
  pull_request:

jobs:
  raku:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        raku-version:
          - 'latest'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: Raku/setup-raku@v1
        with:
          raku-version: ${{ matrix.raku-version }}

      # ---------------------------------------------------------
      # Prebuilt path — no C toolchain needed. zef install runs
      # Build.rakumod which downloads the prebuilt .dylib/.so/.dll
      # from GitHub Releases, SHA-verifies, and stages to the XDG
      # data dir. Proves the end-user install path works without
      # any system deps beyond Raku itself.
      # ---------------------------------------------------------
      - name: Install CRoaring via prebuilt path
        run: zef install --/test .

      - name: Install App::Prove6
        run: zef install --/test App::Prove6

      - name: Run tests — prebuilt path
        run: prove6 --verbose -I. t

      # ---------------------------------------------------------
      # Source-build fallback — needs a C compiler. On Windows,
      # VS Dev Environment provides cl.exe; on Unix, cc is
      # pre-installed on all GH runners.
      # ---------------------------------------------------------
      - name: Setup VS Dev Environment
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $vswhere = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'
          if (-not (Test-Path $vswhere)) { throw "vswhere.exe not found at $vswhere" }

          $installPath = & $vswhere -nologo -latest -products * `
              -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
              -property installationPath
          if (-not $installPath) { throw 'No VS installation with VC.Tools.x86.x64 found' }
          Write-Host "VS install: $installPath"

          $vsdevcmd = Join-Path $installPath 'Common7\Tools\vsdevcmd.bat'
          if (-not (Test-Path $vsdevcmd)) { throw "vsdevcmd.bat not found at $vsdevcmd" }

          $arch = $env:PROCESSOR_ARCHITECTURE.ToLower()
          $before = @{}
          Get-ChildItem env: | ForEach-Object { $before[$_.Name] = $_.Value }

          $lines = & cmd /c "`"$vsdevcmd`" -no_logo -host_arch=$arch -arch=$arch && set"
          if ($LASTEXITCODE -ne 0) { throw "vsdevcmd failed (exit $LASTEXITCODE)" }

          foreach ($line in $lines) {
              if ($line -notmatch '^([^=]+)=(.*)$') { continue }
              $name  = $Matches[1]
              $value = $Matches[2]
              if ($before.ContainsKey($name) -and $before[$name] -eq $value) { continue }
              Add-Content -Path $env:GITHUB_ENV -Value "$name=$value"
          }

      - name: Install CRoaring via source-build path
        env:
          CROARING_BUILD_FROM_SOURCE: '1'
        run: zef install --/test --force-install .

      - name: Run tests — source-build path
        run: prove6 --verbose -I. t
