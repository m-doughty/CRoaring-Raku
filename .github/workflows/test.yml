name: test

on:
  push:
    branches:
      - '*'
    tags-ignore:
      - '*'
  pull_request:

jobs:
  raku:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        raku-version:
          - 'latest'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: Raku/setup-raku@v1
        with:
          raku-version: ${{ matrix.raku-version }}

      # ---------------------------------------------------------
      # Prebuilt path — no C toolchain needed. zef install runs
      # Build.rakumod which downloads the prebuilt .dylib/.so/.dll
      # from GitHub Releases, SHA-verifies, and stages to the XDG
      # data dir. Proves the end-user install path works without
      # any system deps beyond Raku itself.
      # ---------------------------------------------------------
      - name: Install CRoaring via prebuilt path
        run: zef install --/test .

      - name: Install App::Prove6
        run: zef install --/test App::Prove6

      - name: Run tests — prebuilt path
        run: prove6 --verbose -I. t

      # ---------------------------------------------------------
      # Source-build fallback — needs a C compiler. On Windows,
      # VS Dev Environment provides cl.exe; on Unix, cc is
      # pre-installed on all GH runners.
      # ---------------------------------------------------------
      - name: Setup VS Dev Environment
        if: runner.os == 'Windows'
        uses: compnerd/gha-setup-vsdevenv@v6

      - name: Install CRoaring via source-build path
        env:
          CROARING_BUILD_FROM_SOURCE: '1'
        run: zef install --/test --force-install .

      - name: Run tests — source-build path
        run: prove6 --verbose -I. t
