name: glibc-fallback

# Verifies that Build.rakumod correctly detects a system glibc older
# than the prebuilt target ($MIN-GLIBC = 2.35, matching ubuntu-22.04)
# and short-circuits to the source-compile path instead of downloading
# a prebuilt archive that would fail to load at runtime.
#
# GitHub dropped ubuntu-20.04 hosted runners in April 2025, so we use
# a container on ubuntu-latest instead. The ubuntu:20.04 container
# ships glibc 2.31 — comfortably below the 2.35 floor.

on:
  push:
    branches:
      - '*'
    tags-ignore:
      - '*'
  pull_request:

jobs:
  ubuntu-20-04-fallback:
    name: Ubuntu 20.04 (glibc 2.31) → source fallback
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04
    # Containers default to /bin/sh (dash), which lacks `pipefail` and
    # other bashisms the steps below rely on. Force bash workflow-wide.
    defaults:
      run:
        shell: bash
    env:
      DEBIAN_FRONTEND: noninteractive
      # Force no colour so grep against captured log output is
      # predictable across terminals.
      NO_COLOR: '1'
    steps:
      - name: Install system deps
        run: |
          apt-get update
          # Focal's `rakudo` package is years out of date and there's
          # no `zef` package at all, so we don't install Raku via apt.
          # Raku/setup-raku below pulls a current rakudo + zef into
          # the container. The only reason we're in a 20.04 container
          # at all is for the old glibc (2.31) — that's what we're
          # testing the fallback against.
          apt-get install -y --no-install-recommends \
              build-essential curl ca-certificates git
          # Sanity-check the glibc version we're about to test against.
          # Don't pipe to `head` — GH Actions' bash runner enables
          # pipefail, so SIGPIPE'ing ldd propagates as exit 141 and
          # fails the step. ldd's output is 4 lines; just print it.
          ldd --version

      - uses: actions/checkout@v4

      - uses: Raku/setup-raku@v1
        with:
          raku-version: 'latest'

      - name: Install module (capture build log)
        id: install
        run: |
          set -eo pipefail
          # `zef install .` runs Build.rakumod; we tee its output so the
          # subsequent grep can assert the fallback path was taken.
          zef install --/test --verbose . 2>&1 | tee build.log

      - name: Assert fallback message appeared
        run: |
          if ! grep -F 'falling back to source build to avoid runtime loader errors' build.log; then
              echo "❌ Expected glibc-fallback message not found in build log."
              echo "---- build.log tail ----"
              tail -100 build.log
              exit 1
          fi
          echo "✅ Build.rakumod correctly fell back to source compile on old glibc."

      - name: Smoke-test the installed module
        run: |
          set -eo pipefail
          # If the source-compile path produced a working libcroaring.so,
          # a trivial `use CRoaring` load + basic op should succeed.
          raku -e 'use CRoaring; my $b = CRoaring.new; $b.add(42); say $b.contains(42) ?? "ok" !! "fail"' \
              | tee smoke.out
          grep -qx ok smoke.out
